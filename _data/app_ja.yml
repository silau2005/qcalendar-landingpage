name: Q カレンダー
description: Q カレンダー、笑顔で計画！（現在クローズドベータテスト中）
full_description: >
  Q カレンダーは、生活を楽しみ効率を重視するあなたのためにデザインされた、超キュートでモダンなカレンダーアプリです。面倒なスケジュール管理にサヨナラ！Q カレンダーがあなたの素晴らしい生活アシスタントになります！<br>
  <br>主な機能
  <br>- ドラッグ＆ドロップでステッカー：様々な可愛いステッカーでスケジュールをデコレーションして、あなたの個性を表現！
  <br>- 効率的なスケジュール管理：イベント作成、リマインダー設定、スケジュール整理で仕事と生活を簡単に管理！
  <br>- パーソナライズ設定：お気に入りの色とテーマを選んで、カレンダーの見た目をカスタマイズ！
  <br>
  <br>今すぐ Q カレンダーをダウンロードして、生活をより整理しよう！

name: Q 行事曆
description: Q 行事曆，讓計劃變得有趣！（目前封閉測試中）
full_description: >
  Q 行事曆是一款超萌現代的行事曆應用程式，專為熱愛生活和注重效率的你設計。告別繁瑣的日程管理，讓 Q 行事曆成為你的生活好幫手！<br>
  <br>主要功能
  <br>- 拖曳可愛貼紙：用各種可愛的貼紙裝飾你的日程，展現你的個人風格！
  <br>- 高效日程管理：建立事件、設定提醒、安排日程，輕鬆管理你的工作和生活！
  <br>- 個人化設定：選擇你喜歡的顏色和主題，自訂你的行事曆外觀！
  <br>
  <br>立即下載 Q 行事曆，讓你的生活更加井井有條！
